<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styelsy Inventory Logger</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        select,
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; 
            background-color: white;
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #218838;
        }
        #status-message {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            display: none;
        }
        .sku-highlight {
            font-size: 24px;
            font-weight: 900;
            display: block;
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Item 👗</h2>
    <form id="inventory-form">
        
        <div class="form-group">
            <label for="category">Item Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Select a category...</option>
                <option value="TEE">T-Shirt / Top (TEE)</option>
                <option value="SHR">Collared Shirt / Blouse (SHR)</option>
                <option value="SWT">Sweater / Hoodie (SWT)</option>
                <option value="JKT">Jacket / Coat (JKT)</option>
                <option value="PNT">Pants / Jeans (PNT)</option>
                <option value="SKT">Skirt (SKT)</option>
                <option value="DRS">Dress (DRS)</option>
                <option value="ACC">Accessory / Bag (ACC)</option>
                <option value="MSC">Miscellaneous (MSC)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="description">Item Description</label>
            <input type="text" id="description" name="description" placeholder="e.g., Vintage Harley Tee" required>
        </div>
        
        <div class="form-group">
            <label for="cost">Cost of Goods ($)</label>
            <input type="number" id="cost" name="cost" step="0.01" min="0" placeholder="e.g., 5.50" required>
        </div>
        
        <button type="submit" id="submit-btn">Log Item & Get SKU</button>
        <div id="status-message"></div>
    </form>
</div>

<script>
    document.getElementById('inventory-form').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');
        
        // Grab data from the form
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value;
        const cost = document.getElementById('cost').value;

        const payload = {
            category: category,
            description: description,
            cost: cost
        };

        // UI updates while waiting for server
        submitBtn.disabled = true;
        submitBtn.innerText = 'Generating SKU...';
        statusMessage.style.display = 'none';
        
        const backendURL = 'https://script.google.com/macros/s/AKfycby67jMn-fz7WO2RecS2NhnKCId1pnx5Htg8paRfBy-L2WqPRCN6LZQCVwHwFewecg/exec';
                            
        fetch(backendURL, {
            method: 'POST',
            /* 
               IMPORTANT: Removing 'no-cors' here because we NEED to read the response 
               from the server to get the generated SKU. 'no-cors' makes the response opaque.
               Since we set 'Who has access: Anyone' in Apps Script, standard CORS should pass.
            */
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' // Helps bypass strict CORS preflight checks
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === 'success') {
                // Display the massive success message with the new SKU
                statusMessage.style.display = 'block';
                statusMessage.style.backgroundColor = '#d4edda';
                statusMessage.style.color = '#155724';
                statusMessage.style.border = '1px solid #c3e6cb';
                statusMessage.innerHTML = `Saved! Write this on the tag:<br><span class="sku-highlight">${data.sku}</span>`;
                
                document.getElementById('inventory-form').reset();
            } else {
                throw new Error(data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            statusMessage.style.display = 'block';
            statusMessage.style.backgroundColor = '#f8d7da';
            statusMessage.style.color = '#721c24';
            statusMessage.style.border = '1px solid #f5c6cb';
            statusMessage.innerText = 'Error logging item. Check connection.';
        })
        .finally(() => {
            // Reset button state
            submitBtn.disabled = false;
            submitBtn.innerText = 'Log Item & Get SKU';
        });
    });
</script>

</body>
</html>
