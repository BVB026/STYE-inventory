<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styelsy Inventory Logger</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        .hint-text {
            font-weight: normal;
            font-size: 12px;
            color: #777;
            margin-left: 4px;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; 
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #218838;
        }
        #status-message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Item 👗</h2>
    <form id="inventory-form">
        <div class="form-group">
            <label for="sku">Item SKU <span class="hint-text">(e.g., JKT-0426-01)</span></label>
            <input type="text" id="sku" name="sku" placeholder="Format: TYPE-MMYY-##" required>
        </div>
        
        <div class="form-group">
            <label for="description">Item Description <span class="hint-text">(e.g., Vintage Harley Tee)</span></label>
            <input type="text" id="description" name="description" placeholder="Brief description" required>
        </div>
        
        <div class="form-group">
            <label for="cost">Cost of Goods ($)</label>
            <input type="number" id="cost" name="cost" step="0.01" min="0" placeholder="e.g., 5.50" required>
        </div>
        
        <button type="submit">Log Item</button>
        <div id="status-message"></div>
    </form>
</div>

<script>
    document.getElementById('inventory-form').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const sku = document.getElementById('sku').value;
        const description = document.getElementById('description').value;
        const cost = document.getElementById('cost').value;

        const payload = {
            sku: sku,
            description: description,
            cost: cost,
            timestamp: new Date().toLocaleString() // Updated to clean local time format
        };

        const statusMessage = document.getElementById('status-message');
        statusMessage.style.display = 'block';
        statusMessage.style.color = '#007bff';
        statusMessage.innerText = 'Sending...';
        
        const backendURL = 'https://script.google.com/macros/s/AKfycby67jMn-fz7WO2RecS2NhnKCId1pnx5Htg8paRfBy-L2WqPRCN6LZQCVwHwFewecg/exec';
                            
        fetch(backendURL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            statusMessage.style.color = 'green';
            statusMessage.innerText = 'Item logged successfully!';
            document.getElementById('inventory-form').reset();
            
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 3000);
        })
        .catch(error => {
            console.error('Error:', error);
            statusMessage.style.color = 'red';
            statusMessage.innerText = 'Error logging item.';
        });
    });
</script>

</body>
</html>
