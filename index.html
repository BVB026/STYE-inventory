<script>
    document.getElementById('inventory-form').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent page reload

        // Gather the data
        const sku = document.getElementById('sku').value;
        const description = document.getElementById('description').value;
        const cost = document.getElementById('cost').value;

        // Data payload
        const payload = {
            sku: sku,
            description: description,
            cost: cost,
            timestamp: new Date().toISOString()
        };

        const statusMessage = document.getElementById('status-message');
        statusMessage.style.display = 'block';
        statusMessage.style.color = '#007bff';
        statusMessage.innerText = 'Sending...';

        // ---------------------------------------------------------
        // BACKEND INTEGRATION: Replace this URL with your /exec URL!
        // ---------------------------------------------------------
        
        const backendURL = 'https://script.google.com/macros/s/AKfycby67jMn-fz7WO2RecS2NhnKCId1pnx5Htg8paRfBy-L2WqPRCN6LZQCVwHwFewecg/exec';
                            
        fetch(backendURL, {
            method: 'POST',
            mode: 'no-cors', // Often needed for simple Google Apps Script setups
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            statusMessage.style.color = 'green';
            statusMessage.innerText = 'Item logged successfully!';
            document.getElementById('inventory-form').reset();
            
            // Clear the message after 3 seconds
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 3000);
        })
        .catch(error => {
            console.error('Error:', error);
            statusMessage.style.color = 'red';
            statusMessage.innerText = 'Error logging item.';
        });
    });
</script>
